<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>发布文章</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 p-4 md:p-8">
<div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-8">
    <h2 class="text-xl font-semibold text-gray-800 mb-6">发布新文章</h2>
    <!-- article-edit.html中 -->
    <form action="/article/save" method="post" class="space-y-4">
        <!-- 隐藏的文章ID（编辑时用） -->
        <input type="hidden" name="id" th:value="${article?.id}">

        <div>
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">文章标题</label>
            <input type="text" id="title" name="title" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:form-input-focus"
                   th:value="${article?.title}">
        </div>
        <div>
            <label for="content" class="block text-sm font-medium text-gray-700 mb-1">文章内容</label>
            <textarea id="content" name="content" rows="8" required
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:form-input-focus"
                      th:text="${article?.content}"></textarea>
        </div>
        <!-- 文章内容输入框之后 -->
        <div>
            <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600">
                发布文章
            </button>
        </div>
    </form>
</div>
</body>
</html>
