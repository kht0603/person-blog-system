<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 我的博客</title>
    <!-- 引入Tailwind和公共样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                    },
                },
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-purple-50 p-4">
<!-- 登录卡片 -->
<div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8 transition-all duration-500 hover:shadow-xl">
    <h2 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-center text-gray-800 mb-6">欢迎登录我的博客</h2>

    <!-- 登录表单 -->
    <form action="/login" method="post" class="space-y-4">
        <!-- 用户名输入框 -->
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:form-input-focus"
                    placeholder="请输入用户名"
            >
        </div>

        <!-- 密码输入框 -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:form-input-focus"
                    placeholder="请输入密码"
            >
        </div>

        <!-- 在登录表单上方加这个 -->
        <div th:if="${not #strings.isEmpty(msg)}" class="text-red-500 text-sm mb-4" th:text="${msg}"></div>

        <!-- 登录按钮 -->
        <button
                type="submit"
                class="w-full bg-primary text-white font-medium py-2 px-4 rounded-lg btn-hover"
        >
            立即登录
        </button>

        <!-- 去注册按钮 -->
        <div class="text-center text-gray-600 text-sm mt-2">
            还没有账号？<a href="/register.html" class="text-primary hover:underline font-medium">点击注册</a>
        </div>
    </form>
</div>
</body>
</html>
