<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客 - 个人中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                    },
                },
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 p-4 md:p-8">
<!-- 顶部导航 -->
<div class="max-w-5xl mx-auto mb-8 flex justify-between items-center">
    <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-gray-800">我的博客</h1>
    <div class="flex gap-6">
        <a href="/articles.html" class="text-gray-600 hover:text-primary transition-colors">文章列表</a>
        <a href="/profile.html" class="text-primary font-medium">个人中心</a>
        <a href="/login.html" class="text-gray-600 hover:text-primary transition-colors">退出登录</a>
    </div>
</div>

<!-- 个人信息卡片 -->
<div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-8">
    <h2 class="text-xl font-semibold text-gray-800 mb-6">个人信息设置</h2>

    <form action="/profile/update" method="post" enctype="multipart/form-data" class="space-y-6">
        <!-- 头像上传 -->
        <div class="flex items-center gap-4">
            <!-- 头像区域：点击触发文件选择 -->
            <div class="w-20 h-20 rounded-full overflow-hidden border-2 border-primary relative cursor-pointer" onclick="document.getElementById('avatarInput').click()">
                <img th:src="${loginUser?.avatar ?: 'https://picsum.photos/id/237/200/200'}"
                     alt="用户头像" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                    <span class="text-white text-sm">点击更换</span>
                </div>
            </div>

            <div class="hidden">
                <input type="file" id="avatarInput" name="avatar" accept="image/*"
                       onchange="this.nextElementSibling.textContent = this.files[0]?.name">
                <span class="text-xs text-gray-500">未选择文件</span>
            </div>
        </div>

        <!-- 昵称设置 -->
        <div>
            <label for="nickname" class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
            <input type="text" id="nickname" name="nickname" value="测试用户"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:form-input-focus">
        </div>

        <!-- 个人简介 -->
        <div>
            <label for="intro" class="block text-sm font-medium text-gray-700 mb-1">个人简介</label>
            <textarea id="intro" name="intro" rows="3"
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:form-input-focus">这里是个人简介，可以介绍自己的兴趣、擅长领域等~</textarea>
        </div>

        <!-- 保存按钮 -->
        <button type="submit" class="bg-primary text-white px-4 py-2 rounded-lg btn-hover">
            保存修改
        </button>
    </form>
</div>
</body>
</html>
