<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 我的博客</title>
    <!-- 引入外部样式：Tailwind CDN + 自定义样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <!-- 引入Tailwind配置（如果用外部css，也可以写在这里） -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                    },
                },
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-purple-50 p-4">
<!-- 注册卡片 -->
<div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8 transition-all duration-500 hover:shadow-xl">
    <h2 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-center text-gray-800 mb-6">创建博客账号</h2>

    <!-- 注册表单 -->
    <form action="/register" method="post" class="space-y-4">
        <!-- 用户名输入框 -->
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    minlength="3"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:form-input-focus"
                    placeholder="请输入3-16位用户名"
            >
        </div>

        <!-- 密码输入框 -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    minlength="6"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:form-input-focus"
                    placeholder="请输入至少6位密码"
            >
        </div>

        <!-- 昵称输入框 -->
        <div>
            <label for="nickname" class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
            <input
                    type="text"
                    id="nickname"
                    name="nickname"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:form-input-focus"
                    placeholder="请输入你的昵称"
            >
        </div>

        <!-- 注册按钮 -->
        <button
                type="submit"
                class="w-full bg-primary text-white font-medium py-2 px-4 rounded-lg btn-hover"
        >
            注册账号
        </button>

        <!-- 已有账号跳转 -->
        <div class="text-center text-gray-600 text-sm mt-2">
            已有账号？<a href="/login.html" class="text-primary hover:underline">立即登录</a>
        </div>
    </form>
</div>

<!-- 引入外部脚本 -->
<script src="/js/form-validate.js"></script>
</body>
</html>
