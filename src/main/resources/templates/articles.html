<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF - 8">
    <title>文章列表</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>文章列表</h2>
    <table class="table">
        <thead>
        <tr>
            <th>标题</th>
            <th>作者</th>
            <th>浏览量</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="article : ${page.records}">
            <td><a th:href="@{/article/{id}(id=${article.id})}" th:text="${article.title}"></a></td>
            <td th:text="${article.authorId}"></td>
            <td th:text="${article.viewCount}"></td>
            <td>
                <a href="#" class="btn btn - primary">查看详情</a>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="pagination">
        <ul class="pagination">
            <li th:class="${page.current == 1? 'disabled' : ''}">
                <a th:href="@{/articles(pageNum=1)}">首页</a>
            </li>
            <li th:class="${page.current == 1? 'disabled' : ''}">
                <a th:href="@{/articles(pageNum=${page.current - 1})}">上一页</a>
            </li>
            <li th:each="i : ${#numbers.sequence(1, page.pages)}" th:class="${page.current == i? 'active' : ''}">
                <a th:href="@{/articles(pageNum=${i})}" th:text="${i}"></a>
            </li>
            <li th:class="${page.current == page.pages? 'disabled' : ''}">
                <a th:href="@{/articles(pageNum=${page.current + 1})}">下一页</a>
            </li>
            <li th:class="${page.current == page.pages? 'disabled' : ''}">
                <a th:href="@{/articles(pageNum=${page.pages})}">尾页</a>
            </li>
        </ul>
    </div>
    <a href="/publish" class="btn btn - primary">发布文章</a>
</div>
<script src="/js/bootstrap.min.js"></script>
</body>
</html>
