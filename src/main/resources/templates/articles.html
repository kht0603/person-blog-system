<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客 - 文章列表</title>
    <!-- 引入Tailwind和公共样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                    },
                },
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 p-4 md:p-8">
<!-- 顶部导航 -->
<div class="max-w-5xl mx-auto mb-8 flex justify-between items-center">
    <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-gray-800">我的博客</h1>
    <div class="flex gap-6">
        <a href="/articles.html" class="text-primary font-medium">文章列表</a>
        <a href="/profile.html" class="text-gray-600 hover:text-primary transition-colors">个人中心</a>
        <a href="/login.html" class="text-gray-600 hover:text-primary transition-colors">退出登录</a>
    </div>
</div>

<!-- 主内容区 -->
<div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-8">
    <!-- 操作栏 -->
    <div class="mb-6 flex justify-end">
        <button class="bg-secondary text-white px-4 py-2 rounded-lg btn-hover">
            <a href="/article/edit" class="text-white">发布新文章</a>
        </button>
    </div>

    <!-- 文章列表标题 -->
    <h2 class="text-xl font-semibold text-gray-800 mb-4">我的文章列表</h2>
    <!-- 在articles.html的文章列表区域添加 -->
    <div th:if="${not #lists.isEmpty(articles)}" th:each="article : ${articles}" class="border border-gray-200 rounded-lg p-4 mb-4 hover:shadow-md transition-shadow">
        <div class="flex justify-between items-start">
            <h3 class="text-lg font-medium text-primary">
                <a th:href="@{/article/{id}(id=${article.id})}" class="hover:underline" th:text="${article.title}"></a>
            </h3>
            <span class="text-sm text-gray-500" th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd')}"></span>
        </div>
        <p class="text-gray-600 mt-2 line-clamp-2" th:text="${article.content}"></p>
        <div class="mt-3 flex gap-2">
            <a th:href="@{/article/edit(id=${article.id})}" class="text-sm text-primary hover:underline">编辑</a>
            <a th:href="@{/article/delete/{id}(id=${article.id})}" class="text-sm text-red-500 hover:underline">删除</a>
        </div>
    </div>

    <!-- 空状态提示（如果没有文章） -->
    <div class="text-center py-8 text-gray-500" th:if="${#lists.isEmpty(articles)}">
        <p>你还没有发布任何文章，点击“发布新文章”开始创作吧~</p>
    </div>
</div>
</body>
</html>
